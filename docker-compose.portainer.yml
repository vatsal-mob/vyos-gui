version: "3.9"

services:
  backend:
    image: ghcr.io/vatsal-mob/vyos-gui-backend:latest
    pull_policy: always
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      GUI_USERNAME: ${GUI_USERNAME}
      GUI_PASSWORD_HASH: ${GUI_PASSWORD_HASH}
      VYOS_HOST: ${VYOS_HOST}
      VYOS_PORT: ${VYOS_PORT}
      VYOS_SSH_USER: ${VYOS_SSH_USER}
      VYOS_SSH_PASSWORD: ${VYOS_SSH_PASSWORD}
      VYOS_API_KEY: ${VYOS_API_KEY}
      VYOS_API_URL: ${VYOS_API_URL}
      VYOS_TLS_VERIFY: ${VYOS_TLS_VERIFY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/vatsal-mob/vyos-gui-frontend:latest
    pull_policy: always
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
